# =============================================
# SMART MATCHER - Configuration
# =============================================

# --- Serveur ---
server.port=8081
server.address=0.0.0.0

# --- Base de données ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:smartmatcher}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# H2 Console (uniquement en mode dev sans Docker)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Mistral AI ---
spring.ai.mistralai.api-key=${MISTRAL_API_KEY:REMPLACEZ_MOI_PAR_VOTRE_NOUVELLE_CLE}
spring.ai.mistralai.chat.options.model=mistral-small-latest

# --- Upload de fichiers ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Thymeleaf ---
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
