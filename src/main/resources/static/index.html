<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Matcher | AI Recruitment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-bg blob-1"></div>
    <div class="blob-bg blob-2"></div>

    <main class="glass-panel">
        <header>
            <h1 class="gradient-text">Smart Matcher</h1>
            <p>AI-Powered CV & Job Compatibility</p>
        </header>

        <section class="workspace">
            <!-- Left Side: CV Upload -->
            <div class="card cv-section">
                <h2>1. Upload Profile</h2>
                <div class="upload-area" id="drop-zone">
                    <div class="upload-icon">📄</div>
                    <p>Drag and drop your CV (PDF)</p>
                    <span class="or-text">or</span>
                    <label for="cv-upload" class="btn btn-secondary">Browse File</label>
                    <input type="file" id="cv-upload" accept=".pdf" hidden>
                    <p id="file-name" class="file-name"></p>
                </div>
            </div>

            <!-- Right Side: Job Offer -->
            <div class="card job-section">
                <h2>2. Job Offer</h2>
                <div class="input-area">
                    <textarea id="job-description" placeholder="Paste the job description here..." rows="8"></textarea>
                </div>
            </div>
        </section>

        <div class="action-section">
            <button id="analyze-btn" class="btn btn-primary btn-glow" disabled>
                <span class="btn-text">Analyze Match</span>
                <span class="loader hidden"></span>
            </button>
        </div>

        <!-- Results Overlay -->
        <div id="results-container" class="results-container hidden">
            <div class="results-header">
                <h2>Match Results</h2>
                <div class="score-ring">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" id="score-circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="score-text">0%</text>
                    </svg>
                </div>
            </div>
            
            <div class="analysis-details">
                <div class="analysis-card strengths">
                    <h3>🟢 Strengths</h3>
                    <ul id="pros-list"></ul>
                </div>
                <div class="analysis-card weaknesses">
                    <h3>🔴 Weaknesses</h3>
                    <ul id="cons-list"></ul>
                </div>
            </div>
            <p class="summary-text" id="summary-text"></p>
            <button id="reset-btn" class="btn btn-secondary">New Analysis</button>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
